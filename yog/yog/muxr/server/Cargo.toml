[package]
name = "muxr-server"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
readme.workspace = true
description = "muxr terminal multiplexer session server."
keywords = ["muxr", "terminal", "multiplexer", "server", "session"]
categories = ["command-line-utilities", "development-tools"]

[features]
benchmarking = []

[dependencies]
chrono = { workspace = true }
kanal = { workspace = true }
libproc = { version = "0.14.11" }
muxr_config = { workspace = true }
muxr_core = { workspace = true }
muxr_transport = { workspace = true }
parking_lot = { workspace = true }
portable-pty = { version = "0.9" }
rootcause = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
smallvec = { workspace = true }
tokio = { workspace = true }
tracing = { version = "0.1" }
tracing-appender = { version = "0.2" }
tracing-panic = { version = "0.1.2" }
tracing-subscriber = { version = "0.3" }
unicode-width = { version = "0.2" }
url = { workspace = true }
vt100 = { version = "0.16" }
vte = { version = "0.15" }

[dev-dependencies]
criterion = { workspace = true }
rstest = { workspace = true }
tempfile = { workspace = true }
test-that = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }

[[bench]]
name = "process_observation"
harness = false
required-features = ["benchmarking"]

[[bench]]
name = "server_composer"
harness = false
required-features = ["benchmarking"]

[lints]
workspace = true
