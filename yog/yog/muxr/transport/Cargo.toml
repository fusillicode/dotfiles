[package]
name = "muxr-transport"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
readme.workspace = true
description = "Framed local socket transport for muxr."
keywords = ["muxr", "terminal", "multiplexer", "transport", "ipc"]
categories = ["command-line-utilities", "development-tools"]

[features]
benchmarking = []

[dependencies]
bytes = { workspace = true }
futures-util = { version = "0.3", default-features = false, features = ["sink", "std"] }
interprocess = { version = "2.4", default-features = false, features = ["tokio"] }
muxr_core = { workspace = true }
rootcause = { workspace = true }
tokio = { workspace = true }
tokio-util = { version = "0.7", default-features = false, features = ["codec"] }

[dev-dependencies]
rstest = { workspace = true }
test-that = { workspace = true }

[lints]
workspace = true
