[package]
name = "muxr-client"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
readme.workspace = true
description = "muxr terminal multiplexer client."
keywords = ["muxr", "terminal", "multiplexer", "client", "cli"]
categories = ["command-line-utilities", "development-tools"]

[features]
benchmarking = ["muxr_transport/benchmarking"]

[dependencies]
chrono = { workspace = true }
crossterm = { version = "0.29" }
muxr_config = { workspace = true }
muxr_core = { workspace = true }
muxr_transport = { workspace = true }
rootcause = { workspace = true }
tokio = { workspace = true }
ytil_sys = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
rstest = { workspace = true }
tempfile = { workspace = true }
test-that = { workspace = true }

[[bench]]
name = "muxr_performance"
harness = false
required-features = ["benchmarking"]

[lints]
workspace = true
