[package]
name = "znt"
version = "0.1.0"
authors = ["Gian Lu"]
edition = "2024"
license = "MIT"
repository = "https://github.com/fusillicode/dotfiles"
readme = "README.md"
description = "Zellij plugin that creates new tabs next to the focused tab."
keywords = ["zellij", "tabs", "plugin", "wasm"]
categories = ["development-tools"]
publish = false

[dependencies]
zellij-tile = { git = "https://github.com/zellij-org/zellij.git", branch = "main" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rootcause = { workspace = true }
ytil_sys = { workspace = true }
zj = { path = "../../cli" }

[dev-dependencies]
pretty_assertions = { workspace = true }

[lints]
workspace = true
