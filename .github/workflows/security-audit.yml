name: Security audit

on:
  push:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"

jobs:
  security_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: yog
          shared-key: default
          cache-targets: true

      - name: Setup (cargo-audit, cargo-auditable)
        uses: ./.github/actions/setup
        with:
          tools: "cargo-audit,cargo-auditable"

      - name: Build auditable release and audit
        working-directory: yog
        run: |
          cargo run --quiet --bin evoke -- ci audit
