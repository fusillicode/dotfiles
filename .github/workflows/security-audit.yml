name: Security audit

on:
  push:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"

jobs:
  security_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: yog
          shared-key: default
          cache-targets: true

      - name: Setup (cargo-audit, cargo-auditable)
        uses: ./.github/actions/setup
        with:
          tools: "cargo-audit,cargo-auditable,fd-find"

      - name: Build auditable release and audit
        working-directory: yog
        run: |
          # agg, zcp, and zop are Zellij WASM plugins and should not be linked as native Linux binaries.
          rustup target add wasm32-wasip1
          cargo auditable build --release --workspace --exclude agg --exclude zcp --exclude zop
          cargo build --release --manifest-path yog/zj/agg/Cargo.toml --target wasm32-wasip1
          cargo build --release --manifest-path yog/zj/zcp/Cargo.toml --target wasm32-wasip1
          cargo build --release --manifest-path yog/zj/zop/Cargo.toml --target wasm32-wasip1
          fd . './target/release' --type=executable --max-depth=1 --exec-batch cargo audit bin
